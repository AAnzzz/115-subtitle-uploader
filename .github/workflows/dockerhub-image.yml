name: Build And Push Docker Hub Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME || secrets.ANZZZZZ_USERNAME || vars.ANZZZZZ_USERNAME || secrets['anzzzz_username'] || vars['anzzzz_username'] || github.repository_owner }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD || secrets.DOCKER_TOKEN || secrets.ANZZZZZ || secrets['anzzzz'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing Docker Hub username. Supported names: DOCKERHUB_USERNAME / DOCKER_USERNAME / ANZZZZZ_USERNAME / anzzzz_username (secret/variable). Fallback is github.repository_owner." >&2
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Missing Docker Hub token. Supported names: DOCKERHUB_TOKEN / DOCKER_PASSWORD / DOCKER_TOKEN / ANZZZZZ / anzzzz (secret)." >&2
            exit 1
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/115-subtitle-uploader
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
